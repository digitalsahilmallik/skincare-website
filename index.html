<!DOCTYPE html>
<html>
<head>
  <title>Luxury Skin Cream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: linear-gradient(to right, #f8f5f0, #ffffff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #666;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: linear-gradient(45deg, gold, #d4af37);
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* PRODUCT */
    .product {
      padding: 40px 20px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      padding: 20px;
      max-width: 300px;
      margin: auto;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    /* FORM POPUP */
    .form-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 300px;
      z-index: 999;
    }

    .form-popup input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .overlay {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
    }

    /* FEATURES */
    .features {
      padding: 40px;
      text-align: center;
      background: #f9f9f9;
    }

    .feature-box {
      margin: 15px;
      font-size: 18px;
    }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Reveal Your Radiant Glow</h1>
  <p>Premium Skin Brightening Cream for Flawless Skin</p>
  <button class="btn" onclick="openForm()">Shop Now</button>
</div>

<!-- PRODUCT -->
<div class="product">
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Product">
    <h3>Luxury Whitening Cream</h3>
    <p>Instant glow & smooth skin</p>
    <button class="btn" onclick="openForm()">Buy Now</button>
  </div>
</div>

<!-- FEATURES -->
<div class="features">
  <h2>Why Choose Us</h2>
  <div class="feature-box">✨ Brighter Skin Tone</div>
  <div class="feature-box">✨ Smooth & Soft Texture</div>
  <div class="feature-box">✨ Visible Glow in Days</div>
</div>

<!-- FORM -->
<div class="overlay" id="overlay"></div>

<div class="form-popup" id="form">
  <h3>Place Your Order</h3>
  <input placeholder="Full Name">
  <input placeholder="Phone Number">
  <input placeholder="Address (Optional)">
  <button class="btn" onclick="submitForm()">Place Order</button>
</div>

<script>
function openForm() {
  document.getElementById("form").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function submitForm() {
  alert("Thank you! We will contact you soon.");
  document.getElementById("form").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
